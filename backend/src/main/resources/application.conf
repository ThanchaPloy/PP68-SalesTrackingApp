ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.pp68.backend.ApplicationKt.module ]
    }
}

database {
    url      = ${?DATABASE_URL}
    driver   = "org.postgresql.Driver"
    user     = ${?DB_USER}
    password = ${?DB_PASSWORD}
    poolSize = 10
}

jwt {
    secret      = ${?JWT_SECRET}
    issuer      = "pp68-backend"
    audience    = "pp68-mobile"
    realm       = "pp68"
    expireHours = 168
}

upload {
    dir = "uploads"
    dir = ${?UPLOAD_DIR}
}
