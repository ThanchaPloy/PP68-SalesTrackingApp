ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.pp68.backend.ApplicationKt.module ]
    }
}

database {
    url      = "jdbc:postgresql://localhost:5432/pp68_sales"
    url      = ${?DATABASE_URL}
    driver   = "org.postgresql.Driver"
    user     = "postgres"
    user     = ${?DB_USER}
    password = "password"
    password = ${?DB_PASSWORD}
    poolSize = 10
}

jwt {
    secret   = "pp68-super-secret-key-change-in-production"
    secret   = ${?JWT_SECRET}
    issuer   = "pp68-backend"
    audience = "pp68-mobile"
    realm    = "pp68"
    expireHours = 168
}

upload {
    dir = "uploads"
    dir = ${?UPLOAD_DIR}
}