# Project-wide Gradle settings.

# Disable memory mapping for ZIP files and force in-process execution - primary fixes for Windows
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 -Dsun.zip.disableMemoryMapping=true -Dsun.io.useCanonCaches=false -Dkotlin.compiler.execution.strategy=in-process

# AndroidX and Style
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# Windows-specific fixes for file locking
org.gradle.vfs.watch=false
org.gradle.daemon.idletimeout=1000
org.gradle.workers.max=2

# Lint and Worker strategy
android.lint.useOutOfProcessExecution=false
android.lint.usePartialAnalysis=false

# Kotlin and KSP strategy
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx2g -Dsun.zip.disableMemoryMapping=true
ksp.incremental=false
